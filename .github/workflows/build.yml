name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt5 pytest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libegl1

      - name: Run tests
        run: python -m pytest tests/ -q

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            display: Windows
          - os: ubuntu-latest
            display: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install PyQt5 pyinstaller Pillow

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: python -m PyInstaller pastelabel/PasteLabel.spec --noconfirm

      - name: Build with PyInstaller (Linux, Docker ubuntu:18.04)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:18.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive

              apt-get update -qq
              apt-get install -y -qq curl fontconfig binutils \
                libxcb-cursor0 libxkbcommon-x11-0 libegl1-mesa
              apt-get install -y -qq upx-ucl 2>/dev/null || true

              curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -o /tmp/miniforge.sh
              bash /tmp/miniforge.sh -b -p /opt/conda
              /opt/conda/bin/conda install -y python=3.12 pyqt
              /opt/conda/bin/python -m pip install -q pyinstaller pillow

              /opt/conda/bin/python -m PyInstaller pastelabel/PasteLabel.spec --noconfirm
            "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasteLabel-${{ matrix.display }}
          path: dist/PasteLabel*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [ "$TAG" = "$GITHUB_REF" ] && TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts for upload
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p staging
          if [ -f artifacts/PasteLabel-Windows/PasteLabel.exe ]; then
            cp artifacts/PasteLabel-Windows/PasteLabel.exe "staging/PasteLabel-${TAG}-Windows.exe"
          fi
          if [ -f artifacts/PasteLabel-Linux/PasteLabel ]; then
            file artifacts/PasteLabel-Linux/PasteLabel
            cp artifacts/PasteLabel-Linux/PasteLabel "staging/PasteLabel-${TAG}-Linux"
            chmod +x "staging/PasteLabel-${TAG}-Linux"
            file "staging/PasteLabel-${TAG}-Linux"
          fi

      - name: Create or upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          printf '%s\n' \
            "PasteLabel v1.0.2 — 图像标注工具（贴图合成 + LabelMe 检测框）" \
            "" \
            "🐛 修复" \
            "• 贴图句柄命中范围与检测框对齐（句柄区延伸到框外，修复框外点击丢失导致无法缩放/拖动）" \
            "• 贴图句柄悬停显示食指光标 + 白色方块高亮，与检测框一致" \
            "• 修复上次交互残留的 resize_handle 状态污染本次点击" \
            "• 标注模式下点击检测框/贴图不再误进入框体拖拽编辑态" \
            "• 绘制模式（按 W）下点击/悬停贴图与检测框（含句柄）均不进入编辑态，只响应画框" \
            "" \
            "🎨 其他" \
            "• 标签颜色改为按名称稳定哈希分配，新增标签不再打乱已有标签配色" \
            "• 放大镜去掉模式限制，贴图选中时也会显示" \
            > release-notes.md

          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "PasteLabel $TAG" \
            --notes-file release-notes.md
          for f in staging/*; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
          done
