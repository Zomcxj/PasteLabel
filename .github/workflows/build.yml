name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libegl1

      - name: Build with PyInstaller
        run: python -m PyInstaller pastelabel/PasteLabel.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasteLabel-${{ runner.os }}
          path: dist/PasteLabel*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PasteLabel-Windows
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: PasteLabel-Linux
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PasteLabel ${{ github.ref_name }}
          body: |
            ✨ PasteLabel ${{ github.ref_name }} — 图像标注工具（贴图合成 + LabelMe 检测框）

            🔧 核心功能
            • 贴图合成 — 单张/批量放置贴图，支持随机避让算法
            • 检测框标注 — LabelMe 格式 JSON 输出，16 色自动分配
            • 贴图/标注模式切换 — 鼠标交互优先级反转，悬停高亮

            🖼 图片管理
            • 工作/移除路径 — 移除图片到 _delete_ 文件夹，支持恢复
            • 拖拽操作 — 拖入图片/JSON 上传，拖出画布复制文件
            • 记忆 — 自动记录最近 10 组背景图/贴图/标签路径组合

            ✏ 编辑能力
            • 网格辅助线 — 可调间距/线宽/透明度，深色主题自动适配
            • 标注十字线 — 可调粗细、透明度与颜色
            • 放大器窗口 — 标注模式下鼠标周围实时放大预览
            • 检测框缓存 — 3 个持久化缓存槽，支持锁定/改名/自定义快捷键

            🎨 界面体验
            • 深色/浅色主题 — 一键切换，DWM API 同步 Windows 标题栏
            • 中英文切换 — 全界面 + 弹窗按钮同步本地化
            • 快捷键自定义 — 所有动作和缓存槽快捷键可修改
            • 标签统计 — 实时统计标签数量，支持颜色替换
            • 全局异常捕获 — 未处理异常自动写入日志
          files: release-assets/*
          draft: true
