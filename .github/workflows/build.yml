name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt5 pytest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libegl1

      - name: Run tests
        run: python -m pytest tests/ -q

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            display: Windows
          - os: ubuntu-latest
            display: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install PyQt5 pyinstaller Pillow

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: python -m PyInstaller pastelabel/PasteLabel.spec --noconfirm

      - name: Build with PyInstaller (Linux, Docker ubuntu:18.04)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:18.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive

              apt-get update -qq
              apt-get install -y -qq curl binutils libxcb-cursor0 libxkbcommon-x11-0 libegl1-mesa

              # Conda（miniforge）提供的 Python 兼容 glibc 2.17+
              curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -o /tmp/miniforge.sh
              bash /tmp/miniforge.sh -b -p /opt/conda
              /opt/conda/bin/conda install -y python=3.12 pyqt pyinstaller pillow

              /opt/conda/bin/python -m PyInstaller pastelabel/PasteLabel.spec --noconfirm
            "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasteLabel-${{ matrix.display }}
          path: dist/PasteLabel*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [ "$TAG" = "$GITHUB_REF" ] && TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts for upload
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p staging
          if [ -f artifacts/PasteLabel-Windows/PasteLabel.exe ]; then
            cp artifacts/PasteLabel-Windows/PasteLabel.exe "staging/PasteLabel-${TAG}-Windows.exe"
          fi
          if [ -f artifacts/PasteLabel-Linux/PasteLabel ]; then
            file artifacts/PasteLabel-Linux/PasteLabel
            cp artifacts/PasteLabel-Linux/PasteLabel "staging/PasteLabel-${TAG}-Linux"
            chmod +x "staging/PasteLabel-${TAG}-Linux"
            file "staging/PasteLabel-${TAG}-Linux"
          fi

      - name: Create or upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          printf '%s\n' \
            "✨ PasteLabel — 图像标注工具（贴图合成 + LabelMe 检测框）" \
            "" \
            "🔧 核心功能" \
            "• 贴图合成 — 单张/批量放置贴图，支持随机避让算法" \
            "• 检测框标注 — LabelMe 格式 JSON 输出，16 色自动分配" \
            "• 贴图/标注模式切换 — 鼠标交互优先级反转，悬停高亮" \
            "" \
            "🖼 图片管理" \
            "• 工作/移除路径 — 移除图片到 _delete_ 文件夹，支持恢复" \
            "• 拖拽操作 — 拖入图片/JSON 上传，拖出画布复制文件" \
            "• 记忆 — 自动记录最近 10 组背景图/贴图/标签路径组合" \
            "" \
            "✏ 编辑能力" \
            "• 网格辅助线 — 可调间距/线宽/透明度，深色主题自动适配" \
            "• 标注十字线 — 可调粗细、透明度与颜色" \
            "• 放大器窗口 — 标注模式下鼠标周围实时放大预览" \
            "• 检测框缓存 — 3 个持久化缓存槽，支持锁定/改名/自定义快捷键" \
            "" \
            "🎨 界面体验" \
            "• 深色/浅色主题 — 一键切换，DWM API 同步 Windows 标题栏" \
            "• 中英文切换 — 全界面 + 弹窗按钮同步本地化" \
            "• 快捷键自定义 — 所有动作和缓存槽快捷键可修改" \
            "• 标签统计 — 实时统计标签数量，支持颜色替换" \
            "• 全局异常捕获 — 未处理异常自动写入日志" \
            > release-notes.md

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "PasteLabel $TAG" \
              --notes-file release-notes.md
          fi
          for f in staging/*; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
          done
